<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Music Player</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    text-align: center;
    margin: 0;
}

header {
    padding: 40px;
    background: #1f1f1f;
}

h1 {
    margin: 0;
    font-size: 40px;
}

p {
    color: #cccccc;
}

.container {
    padding: 30px;
}

.button {
    display: inline-block;
    padding: 12px 20px;
    margin-top: 20px;
    background: #4CAF50;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}

.button:hover {
    background: #45a049;
}

.features {
    margin-top: 30px;
    text-align: left;
    display: inline-block;
}

img {
    margin-top: 20px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 0 10px black;
}
</style>

</head>

<body>

<header>
    <h1>Simple Music Player</h1>
    <p>A lightweight Windows music player built with C# and WinForms</p>
</header>

<div class="container">

    <a class="button" href="https://github.com/Puppy38/Simple-Music-Player/releases/">⬇ Download</a>

    <h2>Features</h2>

    <div class="features">
        <ul>
            <li>Play / Pause / Stop audio</li>
            <li>Volume control</li>
            <li>Seek bar with time counter</li>
            <li>Supports MP3 and WAV</li>
            <li>Open file with support</li>
            <li>Lightweight installer (BAT-based)</li>
        </ul>
    </div>

    <h2>Screenshot</h2>
    <img src="screenshotNEW.png" alt="Music Player Screenshot">

</div>

</body>
</html>
